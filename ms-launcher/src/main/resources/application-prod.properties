# ═══════════════════════════════════════════════════════════════════
# Production — Amazon RDS (PostgreSQL)
# Required env: DB_HOST, DB_PASS (match your RDS master user & DB name)
# Optional: DB_PORT (default 5432), DB_NAME (default postgres), DB_USER
# ═══════════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
